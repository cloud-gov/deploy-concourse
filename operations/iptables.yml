- type: replace
  path: /instance_groups/name=worker/jobs/-
  value: 
    name: post-deploy-script
    release: os-conf
    properties:
      script: |
        #!/bin/bash
        iptables -I INPUT -p udp --dport 53 -d 169.254.0.2 -j ACCEPT 
        iptables -I INPUT -p tcp --dport 53 -d 169.254.0.2 -j ACCEPT
        iptables -A INPUT -m state --state ESTABLISHED,RELATED -j ACCEPT
        iptables -A OUTPUT -m state --state ESTABLISHED,RELATED -j ACCEPT
        /bin/true


- type: replace
  path: /instance_groups/name=iaas-worker/jobs/-
  value: 
    name: post-deploy-script
    release: os-conf
    properties:
      script: |
        #!/bin/bash
        iptables -I INPUT -p udp --dport 53 -d 169.254.0.2 -j ACCEPT 
        iptables -I INPUT -p tcp --dport 53 -d 169.254.0.2 -j ACCEPT
        iptables -A INPUT -m state --state ESTABLISHED,RELATED -j ACCEPT
        iptables -A OUTPUT -m state --state ESTABLISHED,RELATED -j ACCEPT
        /bin/true

- type: replace
  path: /releases/-
  value:
    name: os-conf  
    version: latest